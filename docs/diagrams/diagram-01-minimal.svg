<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <!-- Arrow markers -->
    <marker id="arrowGray" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#6B7280"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#3B82F6"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#F59E0B"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#10B981"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#8B5CF6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="520" fill="#FAFAFA" rx="0"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#374151">opencode-memnet Architecture</text>

  <!-- ===== 1. OpenCode Plugin (Green, Left) ===== -->
  <rect x="20" y="60" width="200" height="300" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="20" y="60" width="200" height="32" rx="10" fill="#10B981"/>
  <rect x="20" y="82" width="200" height="10" fill="#10B981"/>
  <text x="120" y="81" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">OpenCode Plugin</text>

  <!-- Config file -->
  <rect x="35" y="100" width="170" height="28" rx="5" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="0.8"/>
  <text x="120" y="119" text-anchor="middle" font-size="9.5" fill="#6B7280">.opencode/opencode-memnet.jsonc</text>

  <!-- Hooks list -->
  <text x="35" y="148" font-size="10" font-weight="600" fill="#374151">Hooks</text>
  <text x="42" y="164" font-size="9.5" fill="#6B7280">• chat.message</text>
  <text x="42" y="178" font-size="9.5" fill="#6B7280">• session.idle</text>
  <text x="42" y="192" font-size="9.5" fill="#6B7280">• tool.memory</text>

  <!-- Responsibilities -->
  <line x1="35" y1="202" x2="205" y2="202" stroke="#D1D5DB" stroke-width="0.5"/>
  <text x="35" y="218" font-size="10" font-weight="600" fill="#374151">Responsibilities</text>
  <text x="42" y="234" font-size="9.5" fill="#6B7280">• Thin HTTP client</text>
  <text x="42" y="248" font-size="9.5" fill="#6B7280">• Tags by project/user</text>
  <text x="42" y="262" font-size="9.5" fill="#6B7280">• Injects memories</text>
  <text x="42" y="276" font-size="9.5" fill="#6B7280">  into chat context</text>

  <!-- HTTP client badge -->
  <rect x="50" y="292" width="140" height="24" rx="12" fill="#D1FAE5" stroke="#10B981" stroke-width="0.8"/>
  <text x="120" y="308" text-anchor="middle" font-size="9" font-weight="500" fill="#065F46">REST HTTP Client</text>

  <!-- ===== 2. opencode-memnet Server (Blue, Center) ===== -->
  <rect x="280" y="60" width="280" height="300" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="280" y="60" width="280" height="32" rx="10" fill="#3B82F6"/>
  <rect x="280" y="82" width="280" height="10" fill="#3B82F6"/>
  <text x="420" y="81" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">opencode-memnet Server</text>

  <!-- REST API + WebUI -->
  <rect x="295" y="100" width="120" height="24" rx="5" fill="#DBEAFE" stroke="#93C5FD" stroke-width="0.8"/>
  <text x="355" y="116" text-anchor="middle" font-size="9.5" font-weight="500" fill="#1E40AF">REST API</text>
  <rect x="425" y="100" width="120" height="24" rx="5" fill="#DBEAFE" stroke="#93C5FD" stroke-width="0.8"/>
  <text x="485" y="116" text-anchor="middle" font-size="9.5" font-weight="500" fill="#1E40AF">WebUI</text>

  <!-- Services -->
  <text x="295" y="148" font-size="10" font-weight="600" fill="#374151">Services</text>

  <rect x="295" y="156" width="122" height="22" rx="4" fill="#BFDBFE" stroke="#93C5FD" stroke-width="0.6"/>
  <text x="356" y="171" text-anchor="middle" font-size="9" fill="#1E3A5F">Embedding</text>

  <rect x="295" y="182" width="122" height="22" rx="4" fill="#BFDBFE" stroke="#93C5FD" stroke-width="0.6"/>
  <text x="356" y="197" text-anchor="middle" font-size="9" fill="#1E3A5F">AI Chat</text>

  <rect x="423" y="156" width="122" height="22" rx="4" fill="#BFDBFE" stroke="#93C5FD" stroke-width="0.6"/>
  <text x="484" y="171" text-anchor="middle" font-size="9" fill="#1E3A5F">Auto-Capture</text>

  <rect x="423" y="182" width="122" height="22" rx="4" fill="#BFDBFE" stroke="#93C5FD" stroke-width="0.6"/>
  <text x="484" y="197" text-anchor="middle" font-size="9" fill="#1E3A5F">Tag Migration</text>

  <rect x="295" y="208" width="122" height="22" rx="4" fill="#BFDBFE" stroke="#93C5FD" stroke-width="0.6"/>
  <text x="356" y="223" text-anchor="middle" font-size="9" fill="#1E3A5F">User Profile Learning</text>

  <!-- Background workers -->
  <line x1="295" y1="240" x2="545" y2="240" stroke="#D1D5DB" stroke-width="0.5"/>
  <text x="295" y="256" font-size="10" font-weight="600" fill="#374151">Background Workers</text>
  <rect x="295" y="264" width="250" height="22" rx="4" fill="#DBEAFE" stroke="#93C5FD" stroke-width="0.6"/>
  <text x="420" y="279" text-anchor="middle" font-size="9" fill="#1E3A5F">Memory processing &amp; embedding pipeline</text>

  <!-- Memory store badge -->
  <rect x="320" y="298" width="200" height="24" rx="12" fill="#DBEAFE" stroke="#3B82F6" stroke-width="0.8"/>
  <text x="420" y="314" text-anchor="middle" font-size="9" font-weight="500" fill="#1E40AF">CRUD + Vector Search</text>

  <!-- ===== 3. External APIs (Orange, Top-Right) ===== -->
  <rect x="620" y="60" width="210" height="120" rx="10" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="620" y="60" width="210" height="32" rx="10" fill="#F59E0B"/>
  <rect x="620" y="82" width="210" height="10" fill="#F59E0B"/>
  <text x="725" y="81" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">External APIs</text>

  <rect x="635" y="102" width="180" height="24" rx="5" fill="#FEF3C7" stroke="#FCD34D" stroke-width="0.8"/>
  <text x="725" y="118" text-anchor="middle" font-size="9.5" fill="#92400E">Embedding API</text>
  <text x="725" y="135" text-anchor="middle" font-size="8.5" fill="#B45309">(text-embedding-3-small)</text>

  <rect x="635" y="146" width="180" height="24" rx="5" fill="#FEF3C7" stroke="#FCD34D" stroke-width="0.8"/>
  <text x="725" y="162" text-anchor="middle" font-size="9.5" fill="#92400E">Chat Completions API</text>
  <text x="725" y="179" text-anchor="middle" font-size="8.5" fill="#B45309">(auto-capture / profile learning)</text>

  <!-- ===== 4. PostgreSQL + pgvector (Purple, Bottom-Right) ===== -->
  <rect x="620" y="240" width="210" height="170" rx="10" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="620" y="240" width="210" height="32" rx="10" fill="#8B5CF6"/>
  <rect x="620" y="262" width="210" height="10" fill="#8B5CF6"/>
  <text x="725" y="261" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">PostgreSQL + pgvector</text>

  <text x="635" y="293" font-size="9.5" font-weight="600" fill="#374151">Tables</text>
  <!-- Database icon cylinder hint -->
  <ellipse cx="722" cy="430" rx="68" ry="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="0.6" opacity="0.4"/>

  <text x="642" y="310" font-size="9" fill="#6B7280">• memories</text>
  <text x="652" y="323" font-size="8.5" fill="#9CA3AF">(vector embeddings)</text>
  <text x="642" y="338" font-size="9" fill="#6B7280">• user_profiles</text>
  <text x="642" y="353" font-size="9" fill="#6B7280">• ai_sessions / ai_messages</text>
  <text x="642" y="368" font-size="9" fill="#6B7280">• user_prompts</text>
  <text x="642" y="383" font-size="9" fill="#6B7280">• embedding_config</text>

  <!-- ===== DATA FLOW ARROWS ===== -->

  <!-- Plugin <-> Server (HTTP/REST) -->
  <line x1="220" y1="155" x2="280" y2="155" stroke="#10B981" stroke-width="1.8" marker-end="url(#arrowGreen)"/>
  <line x1="280" y1="170" x2="220" y2="170" stroke="#3B82F6" stroke-width="1.8" marker-end="url(#arrowBlue)"/>
  <text x="250" y="147" text-anchor="middle" font-size="8" fill="#6B7280">HTTP/REST</text>

  <!-- Server -> Embedding API -->
  <line x1="560" y1="115" x2="620" y2="115" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="590" y="108" text-anchor="middle" font-size="7.5" fill="#92400E">embed</text>

  <!-- Server -> Chat API -->
  <line x1="560" y1="160" x2="620" y2="160" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="590" y="153" text-anchor="middle" font-size="7.5" fill="#92400E">chat</text>

  <!-- Server -> PostgreSQL -->
  <line x1="560" y1="310" x2="620" y2="310" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <text x="590" y="303" text-anchor="middle" font-size="7.5" fill="#6B7280">read/write</text>

  <!-- ===== LEGEND ===== -->
  <rect x="20" y="400" width="820" height="50" rx="6" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="0.8"/>
  <text x="40" y="420" font-size="9" font-weight="600" fill="#374151">Data Flow:</text>
  <line x1="100" y1="417" x2="130" y2="417" stroke="#10B981" stroke-width="1.5"/>
  <circle cx="130" cy="417" r="2.5" fill="#10B981"/>
  <text x="136" y="420" font-size="8.5" fill="#6B7280">Plugin → Server</text>
  <line x1="220" y1="417" x2="250" y2="417" stroke="#3B82F6" stroke-width="1.5"/>
  <circle cx="220" cy="417" r="2.5" fill="#3B82F6"/>
  <text x="256" y="420" font-size="8.5" fill="#6B7280">Server → Plugin</text>
  <line x1="345" y1="417" x2="375" y2="417" stroke="#F59E0B" stroke-width="1.5"/>
  <circle cx="375" cy="417" r="2.5" fill="#F59E0B"/>
  <text x="381" y="420" font-size="8.5" fill="#6B7280">Server → External APIs</text>
  <line x1="498" y1="417" x2="528" y2="417" stroke="#8B5CF6" stroke-width="1.5"/>
  <circle cx="528" cy="417" r="2.5" fill="#8B5CF6"/>
  <text x="534" y="420" font-size="8.5" fill="#6B7280">Server → Database</text>

  <!-- Color legend -->
  <rect x="40" y="432" width="10" height="10" rx="2" fill="#10B981"/>
  <text x="55" y="441" font-size="8.5" fill="#6B7280">Client Plugin</text>
  <rect x="140" y="432" width="10" height="10" rx="2" fill="#3B82F6"/>
  <text x="155" y="441" font-size="8.5" fill="#6B7280">Server</text>
  <rect x="210" y="432" width="10" height="10" rx="2" fill="#F59E0B"/>
  <text x="225" y="441" font-size="8.5" fill="#6B7280">External APIs</text>
  <rect x="310" y="432" width="10" height="10" rx="2" fill="#8B5CF6"/>
  <text x="325" y="441" font-size="8.5" fill="#6B7280">PostgreSQL + pgvector</text>

  <!-- Footer -->
  <text x="430" y="475" text-anchor="middle" font-size="8" fill="#9CA3AF">opencode-memnet — Minimal Architecture Overview</text>
</svg>
