    Plugin → Server (HTTP) → Embedding/Chat APIs → Vectors/Analysis → PostgreSQL → Results → Plugin → User
  </text><rect width="240" height="70" x="40" y="660" fill="#f1f5f9" stroke="#cbd5e1" rx="8"/><text x="160" y="682" fill="#334155" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" text-anchor="middle">Key Architectural Insight</text><text x="160" y="700" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="9" text-anchor="middle">Plugin is deliberately thin — it knows</text><text x="160" y="714" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="9" text-anchor="middle">nothing about databases, AI, or embeddings.</text><text x="160" y="722" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="9" text-anchor="middle">Update the server without touching plugin config.</text></svg>