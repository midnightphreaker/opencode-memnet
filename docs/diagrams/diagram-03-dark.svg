<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="'JetBrains Mono', 'Fira Code', Consolas, monospace">
  <defs>
    <!-- Glow filters -->
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#06B6D4" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-green" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#22C55E" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-purple" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#A855F7" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-yellow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#EAB308" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-white" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#94A3B8" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Arrowheads -->
    <marker id="arrow-cyan" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#06B6D4"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#22C55E"/>
    </marker>
    <marker id="arrow-yellow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#EAB308"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#A855F7"/>
    </marker>
    <marker id="arrow-slate" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#64748B"/>
    </marker>

    <!-- Grid pattern -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1E293B" stroke-width="0.5" opacity="0.5"/>
    </pattern>

    <!-- Dot pattern -->
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.7" fill="#334155" opacity="0.6"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="920" height="560" fill="#0F172A" rx="4"/>
  <rect width="920" height="560" fill="url(#dots)" rx="4"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="920" height="32" fill="#1E293B" rx="4"/>
  <rect x="0" y="16" width="920" height="16" fill="#1E293B"/>
  <!-- Terminal dots -->
  <circle cx="18" cy="16" r="5" fill="#EF4444" opacity="0.8"/>
  <circle cx="36" cy="16" r="5" fill="#EAB308" opacity="0.8"/>
  <circle cx="54" cy="16" r="5" fill="#22C55E" opacity="0.8"/>
  <text x="460" y="21" text-anchor="middle" fill="#94A3B8" font-size="12" font-weight="bold">$ opencode-memnet — architecture</text>

  <!-- ============================================ -->
  <!-- SECTION 1: OpenCode Plugin (left)            -->
  <!-- ============================================ -->
  <g filter="url(#glow-green)">
    <rect x="30" y="70" width="230" height="350" rx="6" fill="#22C55E" fill-opacity="0.04" stroke="#22C55E" stroke-width="1.5"/>
  </g>
  <!-- Header -->
  <rect x="30" y="70" width="230" height="30" rx="6" fill="#22C55E" fill-opacity="0.12"/>
  <rect x="30" y="88" width="230" height="12" fill="#22C55E" fill-opacity="0.12"/>
  <text x="145" y="91" text-anchor="middle" fill="#22C55E" font-size="13" font-weight="bold">OpenCode Plugin</text>
  <text x="145" y="106" text-anchor="middle" fill="#4ADE80" font-size="9" opacity="0.7">// client-side</text>

  <!-- Hooks sub-box -->
  <rect x="45" y="118" width="200" height="82" rx="4" fill="#22C55E" fill-opacity="0.03" stroke="#22C55E" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="145" y="135" text-anchor="middle" fill="#4ADE80" font-size="10" font-weight="bold">hooks</text>
  <text x="55" y="152" fill="#86EFAC" font-size="9">▸ chat.message</text>
  <text x="55" y="166" fill="#86EFAC" font-size="9">▸ session.idle</text>
  <text x="55" y="180" fill="#86EFAC" font-size="9">▸ tool.memory</text>

  <!-- Config file -->
  <rect x="45" y="210" width="200" height="34" rx="3" fill="#22C55E" fill-opacity="0.03" stroke="#22C55E" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="55" y="226" fill="#86EFAC" font-size="8.5">.opencode/opencode-memnet.jsonc</text>
  <text x="55" y="238" fill="#4ADE80" font-size="7.5" opacity="0.6">// config &amp; endpoint</text>

  <!-- HTTP Client -->
  <rect x="45" y="254" width="200" height="34" rx="3" fill="#22C55E" fill-opacity="0.03" stroke="#22C55E" stroke-width="0.8"/>
  <text x="145" y="275" text-anchor="middle" fill="#4ADE80" font-size="10" font-weight="bold">HTTP Client (REST)</text>

  <!-- Functions -->
  <rect x="45" y="298" width="200" height="56" rx="4" fill="#22C55E" fill-opacity="0.03" stroke="#22C55E" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="145" y="315" text-anchor="middle" fill="#4ADE80" font-size="10" font-weight="bold">functions</text>
  <text x="55" y="332" fill="#86EFAC" font-size="8.5">▸ tag memories by project/user</text>
  <text x="55" y="346" fill="#86EFAC" font-size="8.5">▸ inject memories → context</text>

  <!-- Port label -->
  <rect x="45" y="365" width="200" height="22" rx="3" fill="#22C55E" fill-opacity="0.06" stroke="#22C55E" stroke-width="0.6"/>
  <text x="145" y="380" text-anchor="middle" fill="#4ADE80" font-size="9" opacity="0.8">⚡ thin client — no AI deps</text>

  <!-- ============================================ -->
  <!-- SECTION 2: opencode-memnet Server (center)   -->
  <!-- ============================================ -->
  <g filter="url(#glow-cyan)">
    <rect x="310" y="52" width="310" height="410" rx="6" fill="#06B6D4" fill-opacity="0.04" stroke="#06B6D4" stroke-width="1.5"/>
  </g>
  <!-- Header -->
  <rect x="310" y="52" width="310" height="32" rx="6" fill="#06B6D4" fill-opacity="0.12"/>
  <rect x="310" y="72" width="310" height="12" fill="#06B6D4" fill-opacity="0.12"/>
  <text x="465" y="74" text-anchor="middle" fill="#06B6D4" font-size="13" font-weight="bold">opencode-memnet Server</text>

  <!-- REST API -->
  <rect x="325" y="96" width="280" height="40" rx="4" fill="#06B6D4" fill-opacity="0.06" stroke="#06B6D4" stroke-width="1"/>
  <text x="465" y="113" text-anchor="middle" fill="#22D3EE" font-size="11" font-weight="bold">REST API</text>
  <text x="465" y="127" text-anchor="middle" fill="#67E8F9" font-size="8.5" opacity="0.7">/api/memories · /api/chat · /api/health</text>

  <!-- WebUI -->
  <rect x="325" y="146" width="280" height="28" rx="3" fill="#06B6D4" fill-opacity="0.03" stroke="#06B6D4" stroke-width="0.7"/>
  <text x="465" y="164" text-anchor="middle" fill="#67E8F9" font-size="10">WebUI Dashboard</text>

  <!-- Services label -->
  <text x="335" y="196" fill="#22D3EE" font-size="10" font-weight="bold">services</text>
  <line x1="395" y1="193" x2="600" y2="193" stroke="#06B6D4" stroke-width="0.5" opacity="0.4"/>

  <!-- Service boxes -->
  <rect x="325" y="206" width="135" height="30" rx="3" fill="#06B6D4" fill-opacity="0.05" stroke="#06B6D4" stroke-width="0.7"/>
  <text x="392" y="225" text-anchor="middle" fill="#67E8F9" font-size="9">Embedding Svc</text>

  <rect x="470" y="206" width="135" height="30" rx="3" fill="#06B6D4" fill-opacity="0.05" stroke="#06B6D4" stroke-width="0.7"/>
  <text x="537" y="225" text-anchor="middle" fill="#67E8F9" font-size="9">AI Chat Svc</text>

  <rect x="325" y="246" width="135" height="30" rx="3" fill="#06B6D4" fill-opacity="0.05" stroke="#06B6D4" stroke-width="0.7"/>
  <text x="392" y="265" text-anchor="middle" fill="#67E8F9" font-size="9">Auto-Capture</text>

  <rect x="470" y="246" width="135" height="30" rx="3" fill="#06B6D4" fill-opacity="0.05" stroke="#06B6D4" stroke-width="0.7"/>
  <text x="537" y="265" text-anchor="middle" fill="#67E8F9" font-size="9">Tag Migration</text>

  <rect x="325" y="286" width="280" height="30" rx="3" fill="#06B6D4" fill-opacity="0.05" stroke="#06B6D4" stroke-width="0.7"/>
  <text x="465" y="305" text-anchor="middle" fill="#67E8F9" font-size="9">User Profile Learning</text>

  <!-- Background workers -->
  <rect x="325" y="330" width="280" height="40" rx="4" fill="#06B6D4" fill-opacity="0.03" stroke="#06B6D4" stroke-width="0.7" stroke-dasharray="5,3"/>
  <text x="465" y="347" text-anchor="middle" fill="#67E8F9" font-size="10" font-weight="bold">Background Workers</text>
  <text x="465" y="361" text-anchor="middle" fill="#67E8F9" font-size="8" opacity="0.6">// periodic embedding, profile updates</text>

  <!-- Port info -->
  <rect x="325" y="382" width="280" height="28" rx="3" fill="#06B6D4" fill-opacity="0.06" stroke="#06B6D4" stroke-width="0.6"/>
  <text x="465" y="400" text-anchor="middle" fill="#22D3EE" font-size="9" opacity="0.8">localhost:3001 · extensible middleware</text>

  <!-- Internal server label -->
  <text x="465" y="438" text-anchor="middle" fill="#22D3EE" font-size="8.5" opacity="0.5">┌─ Go binary ──────────────────┐</text>
  <text x="465" y="451" text-anchor="middle" fill="#22D3EE" font-size="8.5" opacity="0.5">│  single binary, embeds assets │</text>

  <!-- ============================================ -->
  <!-- SECTION 3: External APIs (top-right)         -->
  <!-- ============================================ -->
  <g filter="url(#glow-yellow)">
    <rect x="670" y="52" width="220" height="155" rx="6" fill="#EAB308" fill-opacity="0.04" stroke="#EAB308" stroke-width="1.5"/>
  </g>
  <!-- Header -->
  <rect x="670" y="52" width="220" height="30" rx="6" fill="#EAB308" fill-opacity="0.1"/>
  <rect x="670" y="70" width="220" height="12" fill="#EAB308" fill-opacity="0.1"/>
  <text x="780" y="73" text-anchor="middle" fill="#EAB308" font-size="13" font-weight="bold">External APIs</text>

  <!-- Embedding API -->
  <rect x="685" y="96" width="190" height="42" rx="4" fill="#EAB308" fill-opacity="0.04" stroke="#EAB308" stroke-width="0.8"/>
  <text x="780" y="114" text-anchor="middle" fill="#FACC15" font-size="10" font-weight="bold">Embedding API</text>
  <text x="780" y="128" text-anchor="middle" fill="#FDE047" font-size="8" opacity="0.7">text-embedding-3-small</text>

  <!-- Chat API -->
  <rect x="685" y="150" width="190" height="42" rx="4" fill="#EAB308" fill-opacity="0.04" stroke="#EAB308" stroke-width="0.8"/>
  <text x="780" y="168" text-anchor="middle" fill="#FACC15" font-size="10" font-weight="bold">Chat Completions</text>
  <text x="780" y="182" text-anchor="middle" fill="#FDE047" font-size="8" opacity="0.7">auto-capture · profile learning</text>

  <!-- ============================================ -->
  <!-- SECTION 4: PostgreSQL + pgvector (bottom-right) -->
  <!-- ============================================ -->
  <g filter="url(#glow-purple)">
    <rect x="670" y="250" width="220" height="215" rx="6" fill="#A855F7" fill-opacity="0.04" stroke="#A855F7" stroke-width="1.5"/>
  </g>
  <!-- Header -->
  <rect x="670" y="250" width="220" height="30" rx="6" fill="#A855F7" fill-opacity="0.1"/>
  <rect x="670" y="268" width="220" height="12" fill="#A855F7" fill-opacity="0.1"/>
  <text x="780" y="271" text-anchor="middle" fill="#A855F7" font-size="13" font-weight="bold">PostgreSQL + pgvector</text>

  <!-- Database cylinder icon hint -->
  <text x="780" y="300" text-anchor="middle" fill="#C084FC" font-size="9" opacity="0.5">╔═══════════════════╗</text>

  <!-- Tables -->
  <rect x="685" y="308" width="190" height="24" rx="3" fill="#A855F7" fill-opacity="0.06" stroke="#A855F7" stroke-width="0.6"/>
  <text x="780" y="324" text-anchor="middle" fill="#D8B4FE" font-size="9">memories (vector emb)</text>

  <rect x="685" y="338" width="190" height="24" rx="3" fill="#A855F7" fill-opacity="0.06" stroke="#A855F7" stroke-width="0.6"/>
  <text x="780" y="354" text-anchor="middle" fill="#D8B4FE" font-size="9">user_profiles</text>

  <rect x="685" y="368" width="90" height="24" rx="3" fill="#A855F7" fill-opacity="0.06" stroke="#A855F7" stroke-width="0.6"/>
  <text x="730" y="384" text-anchor="middle" fill="#D8B4FE" font-size="9">ai_sessions</text>

  <rect x="785" y="368" width="90" height="24" rx="3" fill="#A855F7" fill-opacity="0.06" stroke="#A855F7" stroke-width="0.6"/>
  <text x="830" y="384" text-anchor="middle" fill="#D8B4FE" font-size="9">ai_messages</text>

  <rect x="685" y="398" width="190" height="24" rx="3" fill="#A855F7" fill-opacity="0.06" stroke="#A855F7" stroke-width="0.6"/>
  <text x="780" y="414" text-anchor="middle" fill="#D8B4FE" font-size="9">user_prompts · embedding_config</text>

  <!-- DB footer -->
  <text x="780" y="445" text-anchor="middle" fill="#C084FC" font-size="8" opacity="0.5">cosine similarity search · pgvector</text>

  <!-- ============================================ -->
  <!-- ARROWS / DATA FLOW                           -->
  <!-- ============================================ -->

  <!-- Plugin <-> Server (bidirectional REST) -->
  <line x1="260" y1="268" x2="310" y2="116" stroke="#22C55E" stroke-width="1.5" filter="url(#glow-green)" marker-end="url(#arrow-cyan)"/>
  <text x="265" y="178" fill="#4ADE80" font-size="8" transform="rotate(-30, 265, 178)" opacity="0.8">POST /api/memories</text>

  <line x1="310" y1="136" x2="260" y2="288" stroke="#06B6D4" stroke-width="1.5" filter="url(#glow-cyan)" marker-end="url(#arrow-green)"/>
  <text x="270" y="230" fill="#67E8F9" font-size="8" transform="rotate(30, 270, 230)" opacity="0.8">200 JSON memories</text>

  <!-- Bidirectional label -->
  <rect x="252" y="235" width="54" height="16" rx="2" fill="#0F172A" stroke="#64748B" stroke-width="0.5"/>
  <text x="279" y="247" text-anchor="middle" fill="#94A3B8" font-size="8" font-weight="bold">REST</text>

  <!-- Server -> Embedding API -->
  <line x1="620" y1="117" x2="670" y2="117" stroke="#06B6D4" stroke-width="1.2" filter="url(#glow-cyan)" marker-end="url(#arrow-yellow)"/>
  <text x="645" y="110" text-anchor="middle" fill="#67E8F9" font-size="7" opacity="0.7">embed</text>

  <!-- Server -> Chat API -->
  <line x1="620" y1="171" x2="670" y2="171" stroke="#06B6D4" stroke-width="1.2" filter="url(#glow-cyan)" marker-end="url(#arrow-yellow)"/>
  <text x="645" y="164" text-anchor="middle" fill="#67E8F9" font-size="7" opacity="0.7">chat</text>

  <!-- Server -> PostgreSQL -->
  <line x1="620" y1="360" x2="670" y2="360" stroke="#06B6D4" stroke-width="1.2" filter="url(#glow-cyan)" marker-end="url(#arrow-purple)"/>
  <text x="645" y="353" text-anchor="middle" fill="#67E8F9" font-size="7" opacity="0.7">SQL</text>

  <!-- Server -> PostgreSQL (second line for write) -->
  <line x1="620" y1="380" x2="670" y2="380" stroke="#06B6D4" stroke-width="1.2" filter="url(#glow-cyan)" marker-end="url(#arrow-purple)" stroke-dasharray="4,3"/>
  <text x="645" y="396" text-anchor="middle" fill="#67E8F9" font-size="7" opacity="0.7">write</text>

  <!-- ============================================ -->
  <!-- Legend                                        -->
  <!-- ============================================ -->
  <rect x="30" y="470" width="860" height="56" rx="4" fill="#1E293B" fill-opacity="0.5" stroke="#334155" stroke-width="0.5"/>
  <text x="50" y="490" fill="#94A3B8" font-size="10" font-weight="bold">LEGEND</text>

  <!-- Green -->
  <rect x="120" y="480" width="14" height="14" rx="2" fill="none" stroke="#22C55E" stroke-width="1.5" filter="url(#glow-green)"/>
  <text x="140" y="492" fill="#4ADE80" font-size="9">OpenCode Plugin</text>

  <!-- Cyan -->
  <rect x="270" y="480" width="14" height="14" rx="2" fill="none" stroke="#06B6D4" stroke-width="1.5" filter="url(#glow-cyan)"/>
  <text x="290" y="492" fill="#22D3EE" font-size="9">Memnet Server</text>

  <!-- Purple -->
  <rect x="420" y="480" width="14" height="14" rx="2" fill="none" stroke="#A855F7" stroke-width="1.5" filter="url(#glow-purple)"/>
  <text x="440" y="492" fill="#C084FC" font-size="9">PostgreSQL + pgvector</text>

  <!-- Yellow -->
  <rect x="600" y="480" width="14" height="14" rx="2" fill="none" stroke="#EAB308" stroke-width="1.5" filter="url(#glow-yellow)"/>
  <text x="620" y="492" fill="#FACC15" font-size="9">External APIs (OpenAI-compatible)</text>

  <!-- Dashed line -->
  <line x1="120" y1="512" x2="160" y2="512" stroke="#64748B" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="168" y="516" fill="#94A3B8" font-size="9">async / background</text>

  <!-- Solid line -->
  <line x1="310" y1="512" x2="350" y2="512" stroke="#64748B" stroke-width="1"/>
  <text x="358" y="516" fill="#94A3B8" font-size="9">synchronous request</text>

  <!-- Version -->
  <text x="878" y="516" text-anchor="end" fill="#475569" font-size="8">opencode-memnet v0.1</text>

  <!-- Scanline overlay effect (subtle) -->
  <rect x="0" y="0" width="920" height="560" fill="url(#grid)" opacity="0.15" rx="4" pointer-events="none"/>
</svg>