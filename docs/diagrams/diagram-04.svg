<svg xmlns="http://www.w3.org/2000/svg" height="auto" viewBox="0 0 1200 800"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto-start-reverse" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#888" d="m0 0 10 5-10 5z"/></marker><marker id="arrow-accent" markerHeight="6" markerWidth="6" orient="auto-start-reverse" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#4a90d9" d="m0 0 10 5-10 5z"/></marker><marker id="arrow-db" markerHeight="6" markerWidth="6" orient="auto-start-reverse" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#2a9d8f" d="m0 0 10 5-10 5z"/></marker><marker id="arrow-api" markerHeight="6" markerWidth="6" orient="auto-start-reverse" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#e76f51" d="m0 0 10 5-10 5z"/></marker><style>text{font-family:&quot;Segoe UI&quot;,Tahoma,Geneva,Verdana,sans-serif}.subtitle{font-size:13px;font-weight:400;fill:#4a4a4a}.label{font-size:12px;font-weight:500;fill:#333}.small{font-size:11px;fill:#555}.box{fill:#fff;stroke:silver;stroke-width:1.5;rx:8;ry:8}.box-accent{stroke:#4a90d9;stroke-width:2}.header{fill:#f4f6f8;stroke:none;rx:8;ry:8}.flow-line{fill:none;stroke:#888;stroke-width:1.5;marker-end:url(#arrow)}.flow-line-accent{stroke:#4a90d9}.flow-line-db{stroke:#2a9d8f}.flow-line-api{stroke:#e76f51}.dashed{stroke-dasharray:6,4}.badge{fill:#f4f6f8;stroke:silver;stroke-width:1;rx:4;ry:4}.badge-accent{stroke:#4a90d9}.badge-db{stroke:#2a9d8f}.badge-api{stroke:#e76f51}</style></defs><path fill="#fafbfc" d="M0 0h1200v800H0z"/><text x="600" y="40" style="font-size:22px;font-weight:600;fill:#1a1a1a" text-anchor="middle">opencode-memnet Architecture</text><text x="600" y="62" class="subtitle" text-anchor="middle">Client-Server Memory System for AI Coding Agents</text><path d="M50 100h260v280H50z" class="box box-accent"/><path d="M50 100h260v40H50z" class="header"/><text x="130" y="25" class="label" text-anchor="middle" transform="translate(50 100)">OpenCode Plugin (Client)</text><text x="130" y="65" class="small" text-anchor="middle" transform="translate(50 100)">Thin HTTP client — single JS bundle</text><path d="M70 185h220v30H70z" class="badge badge-accent"/><text x="130" y="104" class="small" text-anchor="middle" transform="translate(50 100)">Hooks: chat.message, session.idle, tool.memory</text><path d="M70 225h220v30H70z" class="badge badge-accent"/><text x="130" y="144" class="small" text-anchor="middle" transform="translate(50 100)">Config: .opencode-memnet.jsonc</text><path d="M70 265h220v30H70z" class="badge badge-accent"/><text x="130" y="184" class="small" text-anchor="middle" transform="translate(50 100)">Tags memories by project &amp; user</text><text x="130" y="230" class="small" style="fill:#777" text-anchor="middle" transform="translate(50 100)">No DB, no AI, no embeddings</text><text x="130" y="250" class="small" style="fill:#777" text-anchor="middle" transform="translate(50 100)">Just HTTP calls to Server</text><path d="M380 100h440v280H380z" class="box box-accent"/><path d="M380 100h440v40H380z" class="header"/><text x="220" y="25" class="label" text-anchor="middle" transform="translate(380 100)">opencode-memnet Server (Self-Hosted)</text><text x="220" y="65" class="small" text-anchor="middle" transform="translate(380 100)">Bun/Node HTTP server (Docker deployed)</text><path d="M400 185h190v30H400z" class="badge badge-accent"/><text x="115" y="104" class="small" text-anchor="middle" transform="translate(380 100)">REST API for Plugin</text><path d="M610 185h190v30H610z" class="badge badge-accent"/><text x="325" y="104" class="small" text-anchor="middle" transform="translate(380 100)">Web UI for Browsing</text><text x="220" y="140" class="label" style="font-size:13px" text-anchor="middle" transform="translate(380 100)">Background Services</text><path d="M400 255h120v30H400z" class="badge badge-accent"/><text x="80" y="174" class="small" text-anchor="middle" transform="translate(380 100)">Embedding</text><path d="M530 255h120v30H530z" class="badge badge-accent"/><text x="210" y="174" class="small" text-anchor="middle" transform="translate(380 100)">AI Chat</text><path d="M660 255h120v30H660z" class="badge badge-accent"/><text x="340" y="174" class="small" text-anchor="middle" transform="translate(380 100)">Auto-Capture</text><path d="M400 295h120v30H400z" class="badge badge-accent"/><text x="80" y="214" class="small" text-anchor="middle" transform="translate(380 100)">Tag Migration</text><path d="M530 295h120v30H530z" class="badge badge-accent"/><text x="210" y="214" class="small" text-anchor="middle" transform="translate(380 100)">Profile Learner</text><path d="M660 295h120v30H660z" class="badge badge-accent"/><text x="340" y="214" class="small" text-anchor="middle" transform="translate(380 100)">Cleanup</text><text x="220" y="250" class="small" style="fill:#777" text-anchor="middle" transform="translate(380 100)">All heavy lifting lives here</text><path d="M0 0h290v280H0z" class="box" style="stroke:#2a9d8f;stroke-width:2" transform="translate(860 100)"/><path d="M860 100h290v40H860z" class="header"/><text x="145" y="25" class="label" text-anchor="middle" transform="translate(860 100)">PostgreSQL + pgvector</text><text x="145" y="65" class="small" text-anchor="middle" transform="translate(860 100)">Data Layer (Relational + Vector)</text><path d="M880 185h250v30H880z" class="badge badge-db"/><text x="145" y="104" class="small" text-anchor="middle" transform="translate(860 100)">memories (with vector embeddings)</text><path d="M880 225h250v30H880z" class="badge badge-db"/><text x="145" y="144" class="small" text-anchor="middle" transform="translate(860 100)">user_profiles</text><path d="M880 265h250v30H880z" class="badge badge-db"/><text x="145" y="184" class="small" text-anchor="middle" transform="translate(860 100)">ai_sessions, ai_messages</text><path d="M880 305h250v30H880z" class="badge badge-db"/><text x="145" y="224" class="small" text-anchor="middle" transform="translate(860 100)">user_prompts, embedding_config</text><text x="145" y="260" class="small" style="fill:#777" text-anchor="middle" transform="translate(860 100)">Long-term memory storage</text><path d="M0 0h440v130H0z" class="box" style="stroke:#e76f51;stroke-width:2" transform="translate(380 460)"/><path d="M380 460h440v40H380z" class="header"/><text x="220" y="25" class="label" text-anchor="middle" transform="translate(380 460)">External AI APIs</text><path d="M400 515h190v30H400z" class="badge badge-api"/><text x="115" y="74" class="small" text-anchor="middle" transform="translate(380 460)">Embedding API</text><path d="M610 515h190v30H610z" class="badge badge-api"/><text x="325" y="74" class="small" text-anchor="middle" transform="translate(380 460)">Chat Completions API</text><text x="220" y="110" class="small" style="fill:#777" text-anchor="middle" transform="translate(380 460)">OpenAI, Cohere, Voyage AI, etc.</text><path marker-end="url(#arrow-accent)" d="M310 240h70" class="flow-line flow-line-accent"/><text x="345" y="230" class="small" style="fill:#4a90d9" text-anchor="middle">REST</text><path marker-end="url(#arrow-db)" d="M820 240h40" class="flow-line flow-line-db"/><text x="840" y="230" class="small" style="fill:#2a9d8f" text-anchor="middle">Read/Write</text><path marker-end="url(#arrow-api)" d="M600 380v80" class="flow-line flow-line-api"/><text x="620" y="425" class="small" style="fill:#e76f51" text-anchor="middle">Calls</text><path marker-end="url(#arrow-api)" d="M580 460v-80" class="flow-line flow-line-api dashed"/><text x="560" y="425" class="small" style="fill:#e76f51" text-anchor="middle">Responses</text><path marker-end="url(#arrow-db)" d="M860 260h-40" class="flow-line flow-line-db dashed"/><text x="840" y="280" class="small" style="fill:#2a9d8f" text-anchor="middle">Results</text><path marker-end="url(#arrow-accent)" d="M380 260h-70" class="flow-line flow-line-accent dashed"/><text x="345" y="280" class="small" style="fill:#4a90d9" text-anchor="middle">Responses</text><path d="M0 0h290v130H0z" class="box" style="stroke:#bbb;stroke-dasharray:6,4" transform="translate(50 460)"/><text x="145" y="25" class="label" style="font-size:13px" text-anchor="middle" transform="translate(50 460)">Key Architectural Insight</text><text x="145" y="55" class="small" text-anchor="middle" transform="translate(50 460)">The Plugin is deliberately thin.</text><text x="145" y="75" class="small" text-anchor="middle" transform="translate(50 460)">All intelligence lives in the Server.</text><text x="145" y="95" class="small" text-anchor="middle" transform="translate(50 460)">Update the server without touching</text><text x="145" y="115" class="small" text-anchor="middle" transform="translate(50 460)">plugin config.</text><text x="600" y="650" class="subtitle" style="fill:#777" text-anchor="middle">Data Flow: Plugin → Server → (Embedding API / Chat API) + PostgreSQL → Back to Plugin</text></svg>