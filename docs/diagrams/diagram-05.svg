<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720"><title>opencode-memnet Architecture Diagram</title><desc>Client-server architecture of opencode-memnet memory system for AI coding agents.</desc><defs><linearGradient id="pluginGrad" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" stop-color="#4a6fa5"/><stop offset="100%" stop-color="#36537a"/></linearGradient><linearGradient id="serverGrad" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" stop-color="#2d8a6e"/><stop offset="100%" stop-color="#1f6652"/></linearGradient><linearGradient id="dbGrad" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" stop-color="#8b5a2b"/><stop offset="100%" stop-color="#6b4423"/></linearGradient><linearGradient id="apiGrad" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" stop-color="#7a5a9c"/><stop offset="100%" stop-color="#5c4377"/></linearGradient><marker id="arrow" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5"><path fill="#555" d="m0 0 10 3.5L0 7z"/></marker><marker id="arrow-reverse" markerHeight="7" markerWidth="10" orient="auto" refX="1" refY="3.5"><path fill="#555" d="M10 0 0 3.5 10 7z"/></marker><marker id="arrow-bidirectional" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5"><path fill="#555" d="m0 0 10 3.5L0 7z"/></marker><filter id="shadow" width="106%" height="106%" x="-3%" y="-3%"><feDropShadow dx="0" dy="2" flood-color="#000" flood-opacity=".12" stdDeviation="2"/></filter><style>.card{rx:8;filter:url(#shadow)}.label{font-family:-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,Helvetica,Arial,sans-serif}.title-text{font-size:15px;font-weight:600;fill:#fff}.body-text{font-size:12px;fill:#f0f0f0}.flow-text{font-size:11px;fill:#444;font-weight:500}.service-box{rx:5}.service-text{font-size:11px;fill:#2c3e50;font-weight:500}</style></defs><path fill="#fafbfc" d="M0 0h1100v720H0z"/><g id="plugin"><path fill="url(#pluginGrad)" d="M0 0h240v260H0z" class="card" transform="translate(50 40)"/><text x="120" y="28" class="label title-text" text-anchor="middle" transform="translate(50 40)">OpenCode Plugin</text><text x="120" y="48" fill="#c8d6e5" class="label body-text" font-size="11" text-anchor="middle" transform="translate(50 40)">(Client-Side HTTP Client)</text><path fill="#fff" d="M66 104h208v26H66z" class="service-box" opacity=".12"/><text x="120" y="82" fill="#fff" class="label service-text" text-anchor="middle" transform="translate(50 40)">chat.message (inject memories)</text><path fill="#fff" d="M66 138h208v26H66z" class="service-box" opacity=".12"/><text x="120" y="116" fill="#fff" class="label service-text" text-anchor="middle" transform="translate(50 40)">session.idle (auto-capture)</text><path fill="#fff" d="M66 172h208v26H66z" class="service-box" opacity=".12"/><text x="120" y="150" fill="#fff" class="label service-text" text-anchor="middle" transform="translate(50 40)">tool.memory (search / add / manage)</text><path fill="#fff" stroke="#fff" stroke-dasharray="4 2" d="M66 212h208v28H66z" class="service-box" opacity=".15"/><text x="120" y="191" fill="#fff" class="label service-text" font-weight="600" text-anchor="middle" transform="translate(50 40)">.opencode-memnet.jsonc</text><path fill="#fff" d="M66 254h208v28H66z" class="service-box" opacity=".18"/><text x="120" y="233" fill="#fff" class="label service-text" font-weight="600" text-anchor="middle" transform="translate(50 40)">Single JS Bundle — No DB / No AI</text></g><g id="server"><path fill="url(#serverGrad)" d="M0 0h540v380H0z" class="card" transform="translate(360 40)"/><text x="270" y="28" class="label title-text" text-anchor="middle" transform="translate(360 40)">opencode-memnet Server</text><text x="270" y="48" fill="#a8dcc8" class="label body-text" font-size="11" text-anchor="middle" transform="translate(360 40)">(Self-Hosted Bun/Node HTTP Server)</text><path fill="#fff" d="M376 104h240v52H376z" class="service-box" opacity=".15"/><text x="136" y="84" fill="#fff" class="label service-text" font-weight="600" text-anchor="middle" transform="translate(360 40)">REST API</text><text x="136" y="102" fill="#fff" class="label service-text" font-size="10" text-anchor="middle" transform="translate(360 40)">(add, search, manage memories)</text><path fill="#fff" d="M644 104h240v52H644z" class="service-box" opacity=".15"/><text x="404" y="84" fill="#fff" class="label service-text" font-weight="600" text-anchor="middle" transform="translate(360 40)">Web UI</text><text x="404" y="102" fill="#fff" class="label service-text" font-size="10" text-anchor="middle" transform="translate(360 40)">(browse and manage memories)</text><path stroke="#fff" d="M380 172h500" opacity=".25"/><text x="270" y="150" fill="#c8eadc" class="label body-text" font-size="12" font-weight="500" text-anchor="middle" transform="translate(360 40)">Background Services</text><path fill="#fff" d="M376 202h160v36H376z" class="service-box" opacity=".12"/><text x="96" y="185" fill="#fff" class="label service-text" text-anchor="middle" transform="translate(360 40)">Embedding Service</text><path fill="#fff" d="M550 202h150v36H550z" class="service-box" opacity=".12"/><text x="265" y="185" fill="#fff" class="label service-text" text-anchor="middle" transform="translate(360 40)">AI Chat</text><path fill="#fff" d="M714 202h170v36H714z" class="service-box" opacity=".12"/><text x="439" y="185" fill="#fff" class="label service-text" text-anchor="middle" transform="translate(360 40)">Auto-Capture</text><path fill="#fff" d="M376 250h160v36H376z" class="service-box" opacity=".12"/><text x="96" y="233" fill="#fff" class="label service-text" text-anchor="middle" transform="translate(360 40)">Tag Migration</text><path fill="#fff" d="M550 250h150v36H550z" class="service-box" opacity=".12"/><text x="265" y="233" fill="#fff" class="label service-text" text-anchor="middle" transform="translate(360 40)">Profile Learner</text><path fill="#fff" d="M714 250h170v36H714z" class="service-box" opacity=".12"/><text x="439" y="233" fill="#fff" class="label service-text" text-anchor="middle" transform="translate(360 40)">Cleanup Service</text><path fill="#fff" stroke="#fff" d="M376 304h508v42H376z" class="service-box" opacity=".1"/><text x="270" y="291" fill="#fff" class="label service-text" font-weight="600" text-anchor="middle" transform="translate(360 40)">The Brain — ALL heavy lifting lives here</text><text x="270" y="340" fill="#a8dcc8" class="label body-text" font-size="11" text-anchor="middle" transform="translate(360 40)">Typically deployed via Docker</text><text x="270" y="358" fill="#a8dcc8" class="label body-text" font-size="11" text-anchor="middle" transform="translate(360 40)">Server can be updated independently of the Plugin</text></g><g id="database"><path fill="url(#dbGrad)" d="M0 0h540v190H0z" class="card" transform="translate(360 460)"/><text x="270" y="28" class="label title-text" text-anchor="middle" transform="translate(360 460)">PostgreSQL + pgvector</text><text x="270" y="48" fill="#e8d5c4" class="label body-text" font-size="11" text-anchor="middle" transform="translate(360 460)">(Data Layer — Long-term Memory Storage)</text><path fill="#fff" d="M376 526h152v34H376z" class="service-box" opacity=".12"/><text x="92" y="87" fill="#fff" class="label service-text" text-anchor="middle" transform="translate(360 460)">memories</text><path fill="#fff" d="M540 526h152v34H540z" class="service-box" opacity=".12"/><text x="256" y="87" fill="#fff" class="label service-text" text-anchor="middle" transform="translate(360 460)">user_profiles</text><path fill="#fff" d="M704 526h170v34H704z" class="service-box" opacity=".12"/><text x="429" y="87" fill="#fff" class="label service-text" text-anchor="middle" transform="translate(360 460)">ai_sessions</text><path fill="#fff" d="M376 572h152v34H376z" class="service-box" opacity=".12"/><text x="92" y="133" fill="#fff" class="label service-text" text-anchor="middle" transform="translate(360 460)">ai_messages</text><path fill="#fff" d="M540 572h152v34H540z" class="service-box" opacity=".12"/><text x="256" y="133" fill="#fff" class="label service-text" text-anchor="middle" transform="translate(360 460)">user_prompts</text><path fill="#fff" d="M704 572h170v34H704z" class="service-box" opacity=".12"/><text x="429" y="133" fill="#fff" class="label service-text" text-anchor="middle" transform="translate(360 460)">embedding_config</text><text x="270" y="174" fill="#e8d5c4" class="label body-text" font-size="11" text-anchor="middle" transform="translate(360 460)">pgvector extension enables fast vector similarity search on memory embeddings</text></g><g id="external-apis"><path fill="url(#apiGrad)" d="M0 0h200v180H0z" class="card" transform="translate(940 140)"/><text x="100" y="28" class="label title-text" text-anchor="middle" transform="translate(940 140)">External AI APIs</text><text x="100" y="48" fill="#d8cee5" class="label body-text" font-size="11" text-anchor="middle" transform="translate(940 140)">(Cloud Services)</text><path fill="#fff" d="M956 206h168v42H956z" class="service-box" opacity=".12"/><text x="100" y="84" fill="#fff" class="label service-text" font-weight="600" text-anchor="middle" transform="translate(940 140)">Embedding API</text><text x="100" y="100" fill="#fff" class="label service-text" font-size="10" text-anchor="middle" transform="translate(940 140)">OpenAI / Cohere / Voyage AI</text><path fill="#fff" d="M956 260h168v42H956z" class="service-box" opacity=".12"/><text x="100" y="138" fill="#fff" class="label service-text" font-weight="600" text-anchor="middle" transform="translate(940 140)">Chat Completions API</text><text x="100" y="154" fill="#fff" class="label service-text" font-size="10" text-anchor="middle" transform="translate(940 140)">LLM providers for AI analysis</text></g><path stroke="#555" stroke-width="2" marker-end="url(#arrow)" d="M290 170h70"/><text x="325" y="162" class="label flow-text" text-anchor="middle">HTTP REST</text><path stroke="#555" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow-reverse)" d="M630 420v40"/><text x="660" y="444" class="label flow-text">Read / Write</text><path stroke="#555" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow-reverse)" d="M900 200h40"/><text x="920" y="192" class="label flow-text" text-anchor="middle">text → vectors</text><path stroke="#555" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow-reverse)" d="M900 260h40"/><text x="920" y="252" class="label flow-text" text-anchor="middle">AI analysis</text><path fill="none" stroke="#888" stroke-dasharray="6 3" stroke-width="1.5" marker-start="url(#arrow-reverse)" d="M360 220q-30 0-30-30t-40-30"/><text x="325" y="185" class="label flow-text" text-anchor="middle">Response</text><g id="insight" transform="translate(50 660)"><rect width="850" height="46" fill="#f0f4f8" stroke="#d0d8e0" rx="6"/><text x="20" y="20" fill="#2c3e50" class="label flow-text" font-weight="600">Key Insight:</text><text x="20" y="38" fill="#4a5568" class="label flow-text">The Plugin is deliberately thin — no database, no AI, no embeddings. All intelligence lives in the Server, which can be updated independently.</text></g></svg>