<svg viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <filter id="shadow-lg" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7C3AED"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D97706"/>
    </marker>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFBFF"/>
      <stop offset="100%" stop-color="#F0F4FF"/>
    </linearGradient>
    <linearGradient id="plugin-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="server-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="db-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="api-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.5" fill="#CBD5E1" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="960" height="580" fill="url(#bg-grad)" rx="12"/>
  <rect width="960" height="580" fill="url(#dots)" rx="12"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="16" font-weight="600" fill="#1E293B" letter-spacing="0.5">opencode-memnet — Architecture Overview</text>

  <!-- ════════════════ PLUGIN (LEFT) ════════════════ -->
  <g filter="url(#shadow-lg)">
    <rect x="30" y="65" width="220" height="310" rx="12" fill="white"/>
    <rect x="30" y="65" width="220" height="44" rx="12" fill="url(#plugin-grad)"/>
    <rect x="30" y="93" width="220" height="16" fill="url(#plugin-grad)"/>
    <text x="140" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="white">OpenCode Plugin</text>
    <text x="140" y="114" text-anchor="middle" font-size="10" fill="#6B7280">Client-side · Thin HTTP Client</text>

    <!-- Hooks -->
    <text x="50" y="140" font-size="10" font-weight="600" fill="#374151">Hooks</text>
    <g font-size="9" fill="#6B7280">
      <rect x="50" y="150" width="8" height="8" rx="2" fill="#34D399"/>
      <text x="64" y="158">chat.message — inject context</text>
      <rect x="50" y="168" width="8" height="8" rx="2" fill="#34D399"/>
      <text x="64" y="176">session.idle — auto-capture</text>
      <rect x="50" y="186" width="8" height="8" rx="2" fill="#34D399"/>
      <text x="64" y="194">tool.memory — user commands</text>
    </g>

    <!-- Separator -->
    <line x1="50" y1="210" x2="230" y2="210" stroke="#E5E7EB" stroke-width="1"/>

    <!-- Functions -->
    <text x="50" y="228" font-size="10" font-weight="600" fill="#374151">Responsibilities</text>
    <g font-size="9" fill="#6B7280">
      <text x="54" y="246">→ Tag memories (project/user)</text>
      <text x="54" y="262">→ Search &amp; retrieve memories</text>
      <text x="54" y="278">→ Inject context into chat</text>
    </g>

    <!-- Separator -->
    <line x1="50" y1="292" x2="230" y2="292" stroke="#E5E7EB" stroke-width="1"/>

    <!-- Config -->
    <text x="50" y="310" font-size="10" font-weight="600" fill="#374151">Configuration</text>
    <rect x="50" y="318" width="180" height="24" rx="4" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
    <text x="60" y="334" font-size="8.5" fill="#059669" font-family="'SF Mono', 'Fira Code', monospace">.opencode/opencode-memnet.jsonc</text>
  </g>

  <!-- ════════════════ SERVER (CENTER) ════════════════ -->
  <g filter="url(#shadow-lg)">
    <rect x="310" y="65" width="340" height="430" rx="12" fill="white"/>
    <rect x="310" y="65" width="340" height="44" rx="12" fill="url(#server-grad)"/>
    <rect x="310" y="93" width="340" height="16" fill="url(#server-grad)"/>
    <text x="480" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="white">opencode-memnet Server</text>
    <text x="480" y="114" text-anchor="middle" font-size="10" fill="#6B7280">Self-hosted · Bun Runtime · Docker</text>

    <!-- API + WebUI -->
    <rect x="330" y="128" width="300" height="32" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
    <text x="345" y="148" font-size="10" font-weight="500" fill="#1D4ED8">REST API</text>
    <rect x="440" y="128" width="180" height="32" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
    <text x="455" y="148" font-size="10" font-weight="500" fill="#1D4ED8">WebUI</text>

    <!-- Services grid -->
    <text x="330" y="182" font-size="10" font-weight="600" fill="#374151">Services</text>
    <g>
      <!-- Row 1 -->
      <rect x="330" y="192" width="145" height="40" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
      <text x="345" y="207" font-size="9" font-weight="500" fill="#334155">Embedding</text>
      <text x="345" y="222" font-size="8" fill="#94A3B8">Text → vector conversion</text>

      <rect x="485" y="192" width="145" height="40" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
      <text x="500" y="207" font-size="9" font-weight="500" fill="#334155">AI Chat</text>
      <text x="500" y="222" font-size="8" fill="#94A3B8">LLM completions</text>

      <!-- Row 2 -->
      <rect x="330" y="240" width="145" height="40" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
      <text x="345" y="255" font-size="9" font-weight="500" fill="#334155">Auto-Capture</text>
      <text x="345" y="270" font-size="8" fill="#94A3B8">Extract memories from sessions</text>

      <rect x="485" y="240" width="145" height="40" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
      <text x="500" y="255" font-size="9" font-weight="500" fill="#334155">Tag Migration</text>
      <text x="500" y="270" font-size="8" fill="#94A3B8">Background tag processing</text>

      <!-- Row 3 -->
      <rect x="330" y="288" width="145" height="40" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
      <text x="345" y="303" font-size="9" font-weight="500" fill="#334155">Profile Learner</text>
      <text x="345" y="318" font-size="8" fill="#94A3B8">Coding preferences &amp; patterns</text>

      <rect x="485" y="288" width="145" height="40" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
      <text x="500" y="303" font-size="9" font-weight="500" fill="#334155">Cleanup</text>
      <text x="500" y="318" font-size="8" fill="#94A3B8">Auto-delete old memories</text>
    </g>

    <!-- Separator -->
    <line x1="330" y1="340" x2="630" y2="340" stroke="#E2E8F0" stroke-width="1"/>

    <!-- Data flow -->
    <text x="330" y="358" font-size="10" font-weight="600" fill="#374151">Request Flow</text>
    <g font-size="9" fill="#64748B">
      <text x="345" y="376">1. Receive REST request</text>
      <text x="345" y="392">2. Authenticate via API key</text>
      <text x="345" y="408">3. Process via service layer</text>
      <text x="345" y="424">4. Store/retrieve from Postgres</text>
      <text x="345" y="440">5. Return results</text>
    </g>

    <!-- Badges -->
    <rect x="330" y="455" width="120" height="22" rx="11" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
    <text x="345" y="470" font-size="8.5" font-weight="500" fill="#92400E">⚙ Background workers</text>

    <rect x="460" y="455" width="80" height="22" rx="11" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
    <text x="478" y="470" font-size="8.5" font-weight="500" fill="#92400E">Bun runtime</text>

    <rect x="550" y="455" width="80" height="22" rx="11" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
    <text x="568" y="470" font-size="8.5" font-weight="500" fill="#92400E">🐳 Docker</text>
  </g>

  <!-- ════════════════ DATABASE (BOTTOM RIGHT) ════════════════ -->
  <g filter="url(#shadow)">
    <rect x="710" y="300" width="220" height="195" rx="12" fill="white"/>
    <rect x="710" y="300" width="220" height="44" rx="12" fill="url(#db-grad)"/>
    <rect x="710" y="328" width="220" height="16" fill="url(#db-grad)"/>
    <text x="820" y="327" text-anchor="middle" font-size="13" font-weight="600" fill="white">PostgreSQL</text>
    <text x="820" y="348" text-anchor="middle" font-size="9.5" fill="#7C3AED" font-weight="500">pgvector extension</text>

    <g font-size="9" fill="#4B5563">
      <text x="730" y="370">📊 memories</text>
      <text x="830" y="370" font-size="8" fill="#94A3B8">(embeddings + metadata)</text>
      <text x="730" y="390">👤 user_profiles</text>
      <text x="730" y="410">💬 ai_sessions</text>
      <text x="730" y="430">📝 ai_messages</text>
      <text x="730" y="450">💡 user_prompts</text>
      <text x="730" y="470">⚙ embedding_config</text>
    </g>
  </g>

  <!-- ════════════════ EXTERNAL APIs (TOP RIGHT) ════════════════ -->
  <g filter="url(#shadow)">
    <rect x="710" y="65" width="220" height="195" rx="12" fill="white"/>
    <rect x="710" y="65" width="220" height="44" rx="12" fill="url(#api-grad)"/>
    <rect x="710" y="93" width="220" height="16" fill="url(#api-grad)"/>
    <text x="820" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="white">External APIs</text>
    <text x="820" y="114" text-anchor="middle" font-size="10" fill="#6B7280">Configurable providers</text>

    <!-- Embedding API -->
    <rect x="730" y="130" width="180" height="44" rx="6" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
    <text x="745" y="149" font-size="10" font-weight="500" fill="#92400E">Embedding API</text>
    <text x="745" y="165" font-size="8" fill="#B45309">text-embedding-3-small, Cohere, …</text>

    <!-- Chat API -->
    <rect x="730" y="184" width="180" height="44" rx="6" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
    <text x="745" y="203" font-size="10" font-weight="500" fill="#92400E">Chat Completions API</text>
    <text x="745" y="219" font-size="8" fill="#B45309">For auto-capture &amp; profiles</text>
  </g>

  <!-- ════════════════ ARROWS ════════════════ -->

  <!-- Plugin ↔ Server (bidirectional) -->
  <line x1="250" y1="210" x2="310" y2="210" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow-blue)" marker-start="url(#arrow-blue)"/>
  <rect x="252" y="195" width="56" height="16" rx="3" fill="white" opacity="0.9"/>
  <text x="280" y="206" text-anchor="middle" font-size="8" font-weight="600" fill="#3B82F6">HTTP</text>

  <!-- Server → Embedding API -->
  <path d="M 650 155 L 690 155 L 690 155 L 710 155" stroke="#D97706" stroke-width="1.5" fill="none" marker-end="url(#arrow-amber)" stroke-dasharray="4 3"/>
  <rect x="660" y="142" width="46" height="14" rx="3" fill="white" opacity="0.9"/>
  <text x="683" y="152" text-anchor="middle" font-size="7.5" font-weight="500" fill="#D97706">embed</text>

  <!-- Server → Chat API -->
  <path d="M 650 200 L 690 200 L 690 206 L 710 206" stroke="#D97706" stroke-width="1.5" fill="none" marker-end="url(#arrow-amber)" stroke-dasharray="4 3"/>
  <rect x="660" y="193" width="46" height="14" rx="3" fill="white" opacity="0.9"/>
  <text x="683" y="203" text-anchor="middle" font-size="7.5" font-weight="500" fill="#D97706">chat</text>

  <!-- Server ↔ PostgreSQL -->
  <line x1="650" y1="395" x2="710" y2="395" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arrow-purple)" marker-start="url(#arrow-purple)"/>
  <rect x="660" y="382" width="36" height="14" rx="3" fill="white" opacity="0.9"/>
  <text x="678" y="392" text-anchor="middle" font-size="7.5" font-weight="500" fill="#7C3AED">SQL</text>

  <!-- ════════════════ LEGEND ════════════════ -->
  <g transform="translate(30, 420)">
    <rect x="0" y="0" width="220" height="75" rx="8" fill="white" filter="url(#shadow)" opacity="0.95"/>
    <text x="15" y="20" font-size="9" font-weight="600" fill="#374151">Legend</text>
    <rect x="15" y="30" width="10" height="10" rx="2" fill="url(#plugin-grad)"/>
    <text x="30" y="39" font-size="8.5" fill="#6B7280">Client plugin (OpenCode)</text>
    <rect x="120" y="30" width="10" height="10" rx="2" fill="url(#server-grad)"/>
    <text x="135" y="39" font-size="8.5" fill="#6B7280">Self-hosted server</text>
    <rect x="15" y="48" width="10" height="10" rx="2" fill="url(#db-grad)"/>
    <text x="30" y="57" font-size="8.5" fill="#6B7280">PostgreSQL + pgvector</text>
    <rect x="120" y="48" width="10" height="10" rx="2" fill="url(#api-grad)"/>
    <text x="135" y="57" font-size="8.5" fill="#6B7280">External APIs</text>
    <line x1="15" y1="68" x2="35" y2="68" stroke="#64748B" stroke-width="2"/>
    <text x="40" y="72" font-size="8" fill="#94A3B8">── Data flow</text>
    <line x1="120" y1="68" x2="140" y2="68" stroke="#64748B" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="145" y="72" font-size="8" fill="#94A3B8">- - External call</text>
  </g>
</svg>