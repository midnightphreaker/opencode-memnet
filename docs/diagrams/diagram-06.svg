<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880"><title>opencode-memnet Architecture Diagram</title><desc>Client-server architecture showing the OpenCode Plugin, opencode-memnet Server, PostgreSQL data layer, and External AI APIs with data flow connections.</desc><defs><linearGradient id="a" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#e3f2fd"/><stop offset="100%" stop-color="#bbdefb"/></linearGradient><linearGradient id="c" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#fff3e0"/><stop offset="100%" stop-color="#ffe0b2"/></linearGradient><linearGradient id="d" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#e8f5e9"/><stop offset="100%" stop-color="#c8e6c9"/></linearGradient><linearGradient id="e" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#fce4ec"/><stop offset="100%" stop-color="#f8bbd9"/></linearGradient><linearGradient id="h" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#eceff1"/><stop offset="100%" stop-color="#cfd8dc"/></linearGradient><marker id="f" markerHeight="10" markerUnits="strokeWidth" markerWidth="10" orient="auto" refX="9" refY="5"><path fill="#546e7a" d="m0 0 10 5-10 5 2-5Z"/></marker><marker id="g" markerHeight="10" markerUnits="strokeWidth" markerWidth="10" orient="auto" refX="1" refY="5"><path fill="#546e7a" d="M10 0 0 5l10 5-2-5Z"/></marker><filter id="b" width="106%" height="108%" x="-2%" y="-2%"><feDropShadow dx="0" dy="3" flood-color="#000" flood-opacity=".12" stdDeviation="4"/></filter></defs><path fill="#fafbfc" d="M0 0h1200v880H0z"/><rect width="440" height="110" x="380" y="40" fill="url(#a)" stroke="#1976d2" stroke-width="2" filter="url(#b)" rx="10"/><text x="600" y="72" fill="#1565c0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="700" text-anchor="middle">OpenCode Plugin (Client)</text><text x="600" y="96" fill="#37474f" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" text-anchor="middle">Thin HTTP client • Single JS bundle • No DB / AI / embeddings</text><text x="600" y="120" fill="#546e7a" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" text-anchor="middle">Hooks: chat.message · session.idle · tool.memory · Config: .opencode-memnet.jsonc</text><rect width="560" height="340" x="80" y="210" fill="url(#c)" stroke="#f57c00" stroke-width="2" filter="url(#b)" rx="10"/><text x="360" y="242" fill="#e65100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="700" text-anchor="middle">opencode-memnet Server</text><text x="360" y="262" fill="#546e7a" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" text-anchor="middle">Self-hosted Bun/Node HTTP server · REST API + Web UI · Docker-deployed</text><rect width="240" height="32" x="110" y="280" fill="#fff" stroke="#fb8c00" stroke-width="1.5" rx="6"/><text x="230" y="301" fill="#37474f" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Embedding Service</text><rect width="240" height="32" x="370" y="280" fill="#fff" stroke="#fb8c00" stroke-width="1.5" rx="6"/><text x="490" y="301" fill="#37474f" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" text-anchor="middle">AI Chat</text><rect width="240" height="32" x="110" y="326" fill="#fff" stroke="#fb8c00" stroke-width="1.5" rx="6"/><text x="230" y="347" fill="#37474f" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Auto-Capture</text><rect width="240" height="32" x="370" y="326" fill="#fff" stroke="#fb8c00" stroke-width="1.5" rx="6"/><text x="490" y="347" fill="#37474f" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Tag Migration</text><rect width="240" height="32" x="110" y="372" fill="#fff" stroke="#fb8c00" stroke-width="1.5" rx="6"/><text x="230" y="393" fill="#37474f" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" text-anchor="middle">User Profile Learner</text><rect width="240" height="32" x="370" y="372" fill="#fff" stroke="#fb8c00" stroke-width="1.5" rx="6"/><text x="490" y="393" fill="#37474f" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Cleanup Service</text><text x="360" y="440" fill="#e65100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="700" text-anchor="middle">The Brain of the System</text><text x="360" y="462" fill="#546e7a" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" text-anchor="middle">All heavy lifting: embeddings, AI analysis, data processing, profile learning</text><rect width="400" height="340" x="720" y="210" fill="url(#d)" stroke="#388e3c" stroke-width="2" filter="url(#b)" rx="10"/><text x="920" y="242" fill="#2e7d32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="700" text-anchor="middle">PostgreSQL + pgvector</text><text x="920" y="262" fill="#546e7a" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" text-anchor="middle">Data layer · Relational tables + fast vector similarity search</text><rect width="160" height="28" x="750" y="280" fill="#fff" stroke="#43a047" stroke-width="1.5" rx="5"/><text x="830" y="299" fill="#37474f" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" text-anchor="middle">memories</text><rect width="160" height="28" x="930" y="280" fill="#fff" stroke="#43a047" stroke-width="1.5" rx="5"/><text x="1010" y="299" fill="#37474f" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" text-anchor="middle">user_profiles</text><rect width="160" height="28" x="750" y="320" fill="#fff" stroke="#43a047" stroke-width="1.5" rx="5"/><text x="830" y="339" fill="#37474f" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" text-anchor="middle">ai_sessions</text><rect width="160" height="28" x="930" y="320" fill="#fff" stroke="#43a047" stroke-width="1.5" rx="5"/><text x="1010" y="339" fill="#37474f" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" text-anchor="middle">ai_messages</text><rect width="160" height="28" x="750" y="360" fill="#fff" stroke="#43a047" stroke-width="1.5" rx="5"/><text x="830" y="379" fill="#37474f" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" text-anchor="middle">user_prompts</text><rect width="160" height="28" x="930" y="360" fill="#fff" stroke="#43a047" stroke-width="1.5" rx="5"/><text x="1010" y="379" fill="#37474f" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" text-anchor="middle">embedding_config</text><text x="920" y="430" fill="#2e7d32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Long-Term Memory Storage</text><text x="920" y="452" fill="#546e7a" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" text-anchor="middle">pgvector enables semantic similarity search on vector embeddings</text><rect width="440" height="100" x="380" y="610" fill="url(#e)" stroke="#c2185b" stroke-width="2" filter="url(#b)" rx="10"/><text x="600" y="642" fill="#ad1457" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="700" text-anchor="middle">External AI APIs</text><text x="600" y="666" fill="#37474f" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" text-anchor="middle">Embedding API — OpenAI · Cohere · Voyage AI</text><text x="600" y="688" fill="#37474f" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" text-anchor="middle">Chat Completions API — LLM providers for AI analysis &amp; profile learning</text><path stroke="#546e7a" stroke-dasharray="6,4" stroke-width="2.5" marker-end="url(#f)" marker-start="url(#g)" d="M600 150v60"/><text x="610" y="185" fill="#546e7a" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11">HTTP REST</text><path stroke="#546e7a" stroke-dasharray="6,4" stroke-width="2.5" marker-end="url(#f)" marker-start="url(#g)" d="M640 380h80"/><text x="680" y="370" fill="#546e7a" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" text-anchor="middle">Read / Write</text><path stroke="#546e7a" stroke-dasharray="6,4" stroke-width="2.5" marker-end="url(#f)" marker-start="url(#g)" d="M600 550v60"/><text x="610" y="585" fill="#546e7a" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11">API calls</text><rect width="1040" height="100" x="80" y="740" fill="url(#h)" stroke="#607d8b" stroke-width="1.5" filter="url(#b)" rx="10"/><text x="600" y="772" fill="#455a64" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="700" text-anchor="middle">Key Architectural Insight</text><text x="600" y="798" fill="#37474f" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" text-anchor="middle">The Plugin is deliberately thin — it knows nothing about databases, AI, or embeddings.</text><text x="600" y="820" fill="#37474f" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" text-anchor="middle">All intelligence lives in the Server. Update the server without touching plugin config.</text><rect width="260" height="100" x="80" y="610" fill="#fff" stroke="#b0bec5" filter="url(#b)" rx="8"/><text x="210" y="636" fill="#455a64" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Data Flow</text><path stroke="#546e7a" stroke-width="2" marker-end="url(#f)" d="M110 655h30"/><text x="150" y="659" fill="#546e7a" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12">Request</text><path stroke="#546e7a" stroke-width="2" marker-start="url(#g)" d="M110 680h30"/><text x="150" y="684" fill="#546e7a" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12">Response</text></svg>